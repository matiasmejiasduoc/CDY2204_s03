name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/guide-management:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/guide-management:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/guide-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/guide-worker:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/guide-management:latest
            docker stop guide-management || true
            docker rm guide-management || true
            docker network create app-net || true
            docker run -d --name guide-management --network app-net -p 8080:8080 -v /mnt/efs:/mnt/efs -e SPRING_PROFILES_ACTIVE=prod -e AWS_REGION="${{ secrets.AWS_REGION }}" -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" -e EFS_MOUNT_PATH="${{ secrets.EFS_MOUNT_PATH }}" -e DB_HOST="${{ secrets.DB_HOST }}" -e DB_PORT="${{ secrets.DB_PORT }}" -e DB_NAME="${{ secrets.DB_NAME }}" -e DB_USERNAME="${{ secrets.DB_USERNAME }}" -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" -e RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" -e RABBITMQ_PORT="${{ secrets.RABBITMQ_PORT }}" -e RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}" -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/guide-management:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/guide-worker:latest
            docker stop guide-worker || true
            docker rm guide-worker || true
            docker run -d --name guide-worker --network app-net -p 8081:8081 -e SPRING_PROFILES_ACTIVE=prod -e DB_HOST="${{ secrets.DB_HOST }}" -e DB_PORT="${{ secrets.DB_PORT }}" -e DB_NAME="${{ secrets.DB_NAME }}" -e DB_USERNAME="${{ secrets.DB_USERNAME }}" -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" -e RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" -e RABBITMQ_PORT="${{ secrets.RABBITMQ_PORT }}" -e RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}" -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/guide-worker:latest
